repos:
  - repo: local
    hooks:
      - id: sync-skills
        name: Sync Codex packaging
        entry: python3 scripts/sync_codex_packaging.py
        language: system
        pass_filenames: false
        files: ^(skills/[^/]+/SKILL\.md|\.claude-plugin/marketplace\.json|scripts/sync_codex_packaging\.py)$

      - id: lint-skills
        name: Lint skills
        entry: python3 scripts/lint_skills.py
        language: system
        pass_filenames: false
        always_run: true
